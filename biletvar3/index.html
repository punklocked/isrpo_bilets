<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="light.css">
    <title>Онлайн курсы подготовки к ГИА</title>
</head>
<body>

    <img src="images/aspirante.png" alt="aspirante" class="aspirante">
    <div class="shape shape_one"></div>
    <div class="shape shape_two"></div>
    <div class="shape shape_three"></div>
    <div class="shape shape_four"></div>
    <div class="shape shape_five"></div>

    <section class="main">
        
        <div class="main_box">

            <div class="box_head">
                
                <div class="title">
                    <p>УчиУроки.рф</p>
                </div>
                
                <div class="navigation">
                    <nav>
                        <a href="#">Предметы</a>
                        <a href="#">Преподаватель</a>
                        <a href="#">Отзывы</a>
                    </nav>
                </div>

                <div class="buttons">
                    <a href="#">
                        <img src="images/profile.png" alt="profile_btn">
                    </a>
                    <a href="#" class="change_theme">
                        <img src="images/dark-icon.png" alt="theme_btn">
                    </a>
                </div>
            </div>

            <div class="contact_info">
                <div class="contact_img">
                    <a href="#">
                        <img src="images/vk.png" alt="vk_logo">
                    </a>
                    <a href="#">
                        <img src="images/ok.png" alt="ok_logo">
                    </a>
                    <a href="#">
                        <img src="images/MAX.png" alt="max_logo">
                    </a>
                </div>
                <div class="contact_phone">
                    <p>8 999 999 99 99</p>
                </div>
            </div>

            <div class="info">
                <h1>Онлайн курсы подготовки к <span>ГИА</span></h1>
                <p>С гарантией получения 75 баллов по каждому предмету</p>
                <button>Записаться</button>
            </div>

            <div class="small_text">
                <p>Не является образовательной организацией, все совпадения случайны</p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
